<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RSVP Form • Emily & Ryan</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
background:#f5f3ee;
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.rsvp-form-wrapper{
max-width:600px;
margin:100px auto;
background:white;
padding:50px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
font-family:"BillaMount", serif;
font-size:42px;
text-align:center;
margin-bottom:30px;
}

label{
display:block;
margin-top:20px;
font-size:14px;
letter-spacing:.05em;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
margin-top:30px;
width:100%;
padding:16px;
border:none;
background:#222;
color:white;
border-radius:30px;
font-size:14px;
letter-spacing:.1em;
cursor:pointer;
}

</style>

</head>

<body>

<div class="rsvp-form-wrapper">

<h1>RSVP</h1>

<form>

<label>Full Name</label>
<input type="text" name="name" required>

<label>Will you attend?</label>
<select name="attending">
<option>Joyfully Accept</option>
<option>Regretfully Decline</option>
</select>

<label>Number of Guests</label>
<input type="number" name="guests">

<label>Meal Choice</label>
<select name="meal">
<option>Chicken</option>
<option>Beef</option>
<option>Vegetarian</option>
</select>

<label>Song Request</label>
<input type="text" name="song">

<label>Message to the Couple</label>
<textarea name="message"></textarea>

<button type="submit">Send RSVP</button>

</form>

</div>

</body>
</html>
